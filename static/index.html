<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glaive</title>
    <link rel="stylesheet" href="/static/style.css">
    <script async defer src="/static/altcha.js" type="module"></script>
</head>
<body>
    <div class="online-badge hidden" id="online-badge" title="当前在线访问数（仅管理员可见）">
        <span class="online-dot"></span>
        <span>当前在线 <strong id="online-count">0</strong></span>
    </div>

    <div class="conn-banner hidden" id="conn-banner">
        <span class="conn-spinner"></span>
        <span>正在连接服务器…（首次访问需等待实例启动）</span>
    </div>

    <div class="container">
        <header class="header glass-card">
            <div class="header-top">
                <div class="header-brand">
                    <h1>Glaive</h1>
                    <p class="subtitle">支持任意文件类型的上传与下载</p>
                </div>
                <div class="header-auth" id="header-auth">
                    <button class="btn btn-primary" id="auth-btn">登录 / 注册</button>
                </div>
            </div>
        </header>

        <section class="admin-panel glass-card hidden" id="admin-panel">
            <h2 class="panel-title">管理面板</h2>
            <div class="admin-grid">
                <form class="admin-form" id="create-series-form">
                    <label>创建新系列</label>
                    <div class="form-row">
                        <input type="text" id="new-series-name" placeholder="系列名称" required>
                        <button type="submit" class="btn btn-primary">创建</button>
                    </div>
                </form>
                <form class="admin-form" id="upload-file-form">
                    <label>上传文件</label>
                    <div class="form-row">
                        <select id="upload-series-select" required>
                            <option value="">选择系列</option>
                        </select>
                        <input type="file" id="upload-file-input" required>
                        <button type="submit" class="btn btn-primary">上传</button>
                    </div>
                </form>
            </div>
        </section>

        <main class="file-list" id="file-list">
            <div class="loading">加载中…</div>
        </main>

    </div>

    <div class="modal-overlay" id="notice-modal">
        <div class="modal notice-card" role="alertdialog" aria-modal="true" aria-labelledby="notice-title">
            <button class="modal-close" id="notice-close" aria-label="关闭">&times;</button>
            <div class="notice-icon">📢</div>
            <h2 class="notice-title" id="notice-title">温馨提示</h2>
            <div class="notice-body">
                <p>欢迎使用 Glaive 文件下载中心。请在使用前阅读以下说明：</p>
                <ul class="notice-list">
                    <li>本站所有文件仅供<strong>个人学习、研究与非商业用途</strong>。</li>
                    <li>严禁将本站文件用于任何<strong>商业用途</strong>，包括但不限于销售、转售、二次分发牟利等行为。</li>
                    <li>文件版权归原作者所有，下载后使用风险由使用者自行承担。</li>
                </ul>
            </div>
            <div class="notice-progress"><span class="notice-progress-bar"></span></div>
        </div>
    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal glass-card">
            <button class="modal-close" id="modal-close" aria-label="关闭">&times;</button>
            <div class="modal-tabs">
                <button class="modal-tab active" data-tab="login">登录</button>
                <button class="modal-tab" data-tab="register">注册</button>
            </div>
            <form class="auth-form" id="login-form">
                <label for="login-username">用户名</label>
                <input type="text" id="login-username" name="username" required minlength="3" maxlength="32" placeholder="请输入用户名">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" name="password" required minlength="6" maxlength="128" placeholder="请输入密码">
                <altcha-widget id="login-altcha" challenge="/api/altcha/challenge" name="altcha"></altcha-widget>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
            <form class="auth-form hidden" id="register-form">
                <label for="register-username">用户名</label>
                <input type="text" id="register-username" name="username" required minlength="3" maxlength="32" placeholder="3-32 位字母/数字/下划线/中文">
                <label for="register-password">密码</label>
                <input type="password" id="register-password" name="password" required minlength="6" maxlength="128" placeholder="至少 6 位">
                <altcha-widget id="register-altcha" challenge="/api/altcha/challenge" name="altcha"></altcha-widget>
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
            <p class="auth-message" id="auth-message"></p>
        </div>
    </div>

    <div class="modal-overlay" id="stats-modal">
        <div class="modal glass-card stats-modal" role="dialog" aria-modal="true" aria-labelledby="stats-title">
            <button class="modal-close" id="stats-close" aria-label="关闭">&times;</button>
            <div class="stats-modal-head">
                <h2 class="stats-title" id="stats-title">数据记录</h2>
                <button class="stats-back-btn hidden" id="stats-back" type="button">← 返回</button>
            </div>

            <div class="stats-content" id="stats-content">
                <section class="stats-section">
                    <h3 class="stats-section-title">总览</h3>
                    <div class="stats-overview">
                        <div class="stats-stat">
                            <span class="stats-stat-value" id="stats-total-downloads">0</span>
                            <span class="stats-stat-label">总下载量</span>
                        </div>
                        <div class="stats-stat">
                            <span class="stats-stat-value" id="stats-total-visitors">0</span>
                            <span class="stats-stat-label">总访问人数</span>
                        </div>
                    </div>
                </section>

                <section class="stats-section">
                    <h3 class="stats-section-title">文件下载统计</h3>
                    <div class="stats-files" id="stats-files">
                        <div class="stats-empty">加载中…</div>
                    </div>
                </section>

                <section class="stats-section">
                    <h3 class="stats-section-title">注册账号（<span id="stats-user-count">0</span>）</h3>
                    <ul class="stats-users" id="stats-users"></ul>
                </section>
            </div>

            <div class="stats-history hidden" id="stats-history">
                <div class="stats-history-summary">
                    <div class="stats-history-user">
                        <span class="stats-history-name" id="stats-history-name"></span>
                        <span class="stats-history-sub" id="stats-history-sub"></span>
                    </div>
                    <div class="stats-history-ratio" id="stats-history-ratio"></div>
                </div>
                <div class="stats-history-toolbar">
                    <span class="stats-history-count" id="stats-history-count"></span>
                    <button class="stats-sort-btn" id="stats-history-sort" type="button">按时间 ↓ 最新优先</button>
                </div>
                <div class="stats-history-table-wrap">
                    <table class="stats-history-table">
                        <thead>
                            <tr>
                                <th class="col-name">文件名</th>
                                <th class="col-series">系列</th>
                                <th class="col-time">下载时间</th>
                            </tr>
                        </thead>
                        <tbody id="stats-history-body"></tbody>
                    </table>
                    <div class="stats-empty hidden" id="stats-history-empty">暂无下载记录</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/glass.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
