services:
  - type: web
    name: download-site
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATA_DIR
        value: /tmp/data
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: Glaive
      # ⚠️ ADMIN_PASSWORD 不在此处硬编码，避免覆盖用户真实密码
      # 首次部署后请到 Render 控制台 Environment 页面手动设置 ADMIN_PASSWORD
      # 默认值（未设置时）: 19866179818
      # 如忘记密码，可设置 RESET_ADMIN_PASSWORD=1 触发启动时重置
      - key: RESET_ADMIN_PASSWORD
        value: "0"
