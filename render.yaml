services:
  - type: web
    name: download-site
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: Glaive
      - key: ADMIN_PASSWORD
        value: "19866179818"
      - key: RESET_ADMIN_PASSWORD
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: download-site-db
          property: connectionString
      # Cloudflare R2（S3 API）配置
      # 请在 Render 控制台 Environment 页面填入真实值，或使用 R2 提供的 API 令牌
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      # R2 公开访问域名（可选）：桶公开访问并绑定自定义域名时填写
      - key: R2_PUBLIC_URL
        sync: false
      # 紧急重置密码端点令牌（可选）
      - key: ADMIN_INIT_TOKEN
        generateValue: true
      # ALTCHA 人机验证（Proof-of-Work CAPTCHA）HMAC 密钥
      - key: ALTCHA_HMAC_KEY
        generateValue: true

databases:
  - name: download-site-db
    plan: free
