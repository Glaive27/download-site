services:
  - type: web
    name: download-site
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: Glaive
      # ⚠️ ADMIN_PASSWORD 不在此处硬编码，避免覆盖用户真实密码
      # 首次部署后请到 Render 控制台 Environment 页面手动设置 ADMIN_PASSWORD
      # 默认值（未设置时）: 19866179818
      # 如忘记密码，可设置 RESET_ADMIN_PASSWORD=1 触发启动时重置
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: RESET_ADMIN_PASSWORD
        value: "0"
      # PostgreSQL 数据库连接字符串，由 Render PostgreSQL 自动注入
      - key: DATABASE_URL
        fromDatabase:
          name: download-site-db
          property: connectionString
      # Cloudflare R2（S3 API）配置
      # 请在 Render 控制台 Environment 页面填入真实值，或使用 R2 提供的 API 令牌
      - key: R2_ACCOUNT_ID
        value: ""
        sync: false
      - key: R2_ACCESS_KEY_ID
        value: ""
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        value: ""
        sync: false
      - key: R2_BUCKET
        value: ""
        sync: false
      # R2 公开访问域名（可选）：桶公开访问并绑定自定义域名时填写
      - key: R2_PUBLIC_URL
        value: ""
        sync: false
      # 紧急重置密码端点令牌（可选）
      - key: ADMIN_INIT_TOKEN
        generateValue: true

  - type: postgres
    name: download-site-db
    plan: free
    ipAllowList: []
