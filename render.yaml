services:
  - type: web
    name: download-site
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: Glaive
      - key: ADMIN_PASSWORD
        value: "19866179818"
      - key: RESET_ADMIN_PASSWORD
        value: "0"
      - key: DATABASE_URL
        fromDatabase:
          name: download-site-db
          property: connectionString
      # Cloudflare R2（S3 API）配置
      # 请在 Render 控制台 Environment 页面填入真实值，或使用 R2 提供的 API 令牌
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      # R2 公开访问域名（可选）：桶公开访问并绑定自定义域名时填写
      - key: R2_PUBLIC_URL
        sync: false
      # 紧急重置密码端点令牌（可选）
      - key: ADMIN_INIT_TOKEN
        generateValue: true
      # ALTCHA 人机验证（Proof-of-Work CAPTCHA）HMAC 密钥
      - key: ALTCHA_HMAC_KEY
        generateValue: true
      # 不活跃账号自动管理（仅针对注册后从未下载文件的普通账号，管理员豁免）
      # 超过 ACCOUNT_RISK_DAYS 天未上线 → 标记高危；超过 ACCOUNT_DELETE_DAYS 天 → 注销
      - key: ACCOUNT_RISK_DAYS
        value: "5"
      - key: ACCOUNT_DELETE_DAYS
        value: "10"
      - key: ACCOUNT_SWEEP_INTERVAL_SECONDS
        value: "3600"
      # 数据库存储额度（字节）：用于「数据记录」弹窗展示剩余空间进度条
      # Render 免费 PostgreSQL 实例磁盘上限为 1 GB；使用更高套餐请相应调大
      - key: DATABASE_QUOTA_BYTES
        value: "1073741824"

databases:
  - name: download-site-db
    plan: free
